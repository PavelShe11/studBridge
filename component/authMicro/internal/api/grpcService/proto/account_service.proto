syntax = "proto3";

option go_package = "userMicro/internal/api/grpcService";

import "google/protobuf/struct.proto";
import "error.proto";

service AccountService {
  rpc createAccount(CreateAccountRequest) returns (CreateAccountResponse) {}
  rpc getAccountByEmail(GetAccountByEmailRequest) returns (GetAccountResponse) {}
  rpc getAccountById(GetAccountByIdRequest) returns (GetAccountResponse) {}
  rpc validateAccountData(ValidateAccountRequest) returns (ValidateAccountResponse) {}
}

message ValidateAccountRequest {
  map<string, google.protobuf.Value> userData = 1;
}

message ValidateAccountResponse {
  optional Error error = 1;
}

message GetAccountByEmailRequest {
  string email = 1;
}

message GetAccountByIdRequest {
  string accountId = 1;
}

message GetAccountResponse {
  oneof result {
    AccountWrapper account = 1;
    Error error = 2;
  }

  message AccountWrapper {
    map<string, google.protobuf.Value> userData = 1;
  }
}

message CreateAccountRequest {
  map<string, google.protobuf.Value> userData = 1;
}

message CreateAccountResponse {
  optional Error error = 1;
}

