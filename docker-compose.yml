services:
  traefik:
    image: traefik:v3.4
    security_opt:
      - no-new-privileges:true
    env_file:
      - ./.env
    ports:
      - "80:80"
      - "8088:8080"
    labels:
      - "traefik.http.middlewares.dashboard-auth.basicauth.users=${BASIC_AUTH_USER_PASS}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./traefic.yml:/etc/traefik/traefik.yml:ro
      - ./dynamic:/dynamic:ro
    restart: unless-stopped
    networks:
      - shared-network

  auth-service:
    build:
      context: ./component/authMicro
      dockerfile: Dockerfile
    container_name: auth-service
    environment:
      DBHost: auth-db-db
      DBName: ${AUTH_PG_DB_NAME}
      DBUsername: ${AUTH_PG_DB_USER}
      JWTSecret: ${JWT_SECRET}
      JWTAccessTokenExpiration: ${ACCESS_TOKEN_LIFETIME}
      JWTRefreshTokenExpiration: ${REFRESH_TOKEN_LIFETIME}
      AccountServiceGrpcAddr: user-service:9092
    depends_on:
      auth-db-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - auth-network
      - shared-network

  auth-db-postgres:
    image: postgres:16-alpine
    container_name: auth-db-db
    environment:
      POSTGRES_DB: ${AUTH_PG_DB_NAME}
      POSTGRES_USER: ${AUTH_PG_DB_USER}
      POSTGRES_PASSWORD: "db"
      PGSSLMODE: "disable"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_PG_DB_USER}" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
    restart: unless-stopped
    volumes:
      - auth_db_data:/var/lib/postgresql/data
    networks:
      - auth-network


  user-service:
    build:
      context: ./component/userMicro
      dockerfile: Dockerfile
    container_name: user-service
    environment:
      DBHost: user-db-db
      DBName: ${USER_PG_DB_NAME}
      DBUsername: ${AUTH_PG_DB_USER}
      JWTSecret: ${JWT_SECRET}
      JWTAccessTokenExpiration: ${ACCESS_TOKEN_LIFETIME}
      JWTRefreshTokenExpiration: ${REFRESH_TOKEN_LIFETIME}
    depends_on:
      auth-db-postgres:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - user-network
      - shared-network

  user-db-postgres:
    image: postgres:16-alpine
    container_name: user-db-db
    environment:
      POSTGRES_DB: ${USER_PG_DB_NAME}
      POSTGRES_USER: ${AUTH_PG_DB_USER}
      POSTGRES_PASSWORD: "db"
      PGSSLMODE: "disable"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${AUTH_PG_DB_USER}" ]
      interval: ${HEALTHCHECK_INTERVAL}
      timeout: ${HEALTHCHECK_TIMEOUT}
      retries: ${HEALTHCHECK_RETRIES}
    restart: unless-stopped
    volumes:
      - user_db_data:/var/lib/postgresql/data
    networks:
      - user-network

volumes:
  auth_db_data:
  user_db_data:

networks:
  shared-network:
    name: shared-network
    driver: bridge

  auth-network:
    name: auth-network
    driver: bridge

  user-network:
    name: user-network
    driver: bridge
